shamefullyHoist: true
autoInstallPeers: true
packages:
  - 'projects/*'

# pnpm 11 reads workspace-scoped settings (overrides, build allowlists,
# minimumReleaseAgeExclude, ignoredOptionalDependencies) from THIS file, NOT
# from package.json's `pnpm` block (which pnpm 11 silently ignores). On
# `lt fullstack init` the api + app templates' settings are hoisted into this
# file (see cli/src/lib/hoist-workspace-pnpm-config.ts); the entries below are
# the lt-monorepo's own and are merged with the hoisted ones.

# Build-script approvals. `allowBuilds` is the pnpm 11 key; `onlyBuiltDependencies`
# is kept as the pnpm 10 twin so the allowlist survives whichever key pnpm reads.
allowBuilds:
  '@swc/core': true
  bcrypt: true
  esbuild: true
  puppeteer: true
  sharp: true

# Dependency overrides (security fixes).
#
# Override TARGETS (right-hand side) MUST be FIXED versions — never ranges like
# ">=X" or "^X" (pnpm would silently install a newer major). The range on the LEFT
# selects which installed versions get replaced, so a bounded key can only ever
# raise a vulnerable version and never cap a patched one.
#
# NOTE: pnpm `overrides:` apply only to the ROOT project of an install, so these
# do NOT travel to projects generated from this template — they are hoisted into
# the generated workspace by `lt fullstack init` instead.
overrides:
  # Security: brace-expansion DoS via exponential-time expansion of consecutive
  # non-expanding {} groups (GHSA-3jxr-9vmj-r5cp, high, patched >=1.1.16).
  # Dev only, via commit-and-tag-version>dotgitignore>minimatch>brace-expansion.
  # Drop once dotgitignore/minimatch request a patched range themselves.
  'brace-expansion@<1.1.16': '1.1.16'

  # Security: fast-xml-parser ReDoS (GHSA-8r6m-32jq-jx6q, high, patched >=5.10.1).
  # Dev only, via commit-and-tag-version>fast-xml-parser.
  # Drop once commit-and-tag-version requests >=5.10.1 itself.
  'fast-xml-parser@>=5.9.3 <5.10.1': '5.10.1'
