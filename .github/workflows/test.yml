# GitHub Actions equivalent of .gitlab-ci.yml — keeps E2E + tests green on
# repos mirrored to GitHub. The App E2E job mirrors the GitLab `app:test`
# job: it boots the API on :3000, then runs Playwright (which starts the
# Nuxt app on :3001 via its webServer block).
#
# Triggers: pull requests, plus `workflow_call` so deploy.yml can run this
# suite as its gate. There is deliberately NO `push:` trigger — on dev/main
# deploy.yml calls this workflow, so a push trigger would run every test twice.
name: Test

on:
  pull_request:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Provision the exact pnpm pinned in package.json (single source of truth).
      # No corepack: Node >= 25 no longer ships it. The +sha512 suffix is stripped;
      # npm enforces registry integrity for the tarball itself.
      - run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check
      - run: pnpm run lint

  # Security audit — mirrors the `audit` step of `pnpm run check`, but
  # NON-BLOCKING here: `continue-on-error` surfaces which packages/advisories are
  # affected without gating the deploy. Resolve findings by pinning the
  # vulnerable transitive dep via pnpm.overrides.
  audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Provision the exact pnpm pinned in package.json (single source of truth).
      # No corepack: Node >= 25 no longer ships it. The +sha512 suffix is stripped;
      # npm enforces registry integrity for the tarball itself.
      - run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit

  api-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NSC__MONGOOSE__URI: mongodb://localhost:27017/api-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Provision the exact pnpm pinned in package.json (single source of truth).
      # No corepack: Node >= 25 no longer ships it. The +sha512 suffix is stripped;
      # npm enforces registry integrity for the tarball itself.
      - run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run api:test

  app-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    services:
      mongo:
        image: mongo:7
    env:
      # Classic ports in CI (no lt dev / Caddy). The App E2E tests read these
      # env vars and fall back to localhost:3000/3001 when unset, so the same
      # suite also runs under `lt dev up` locally.
      NSC__MONGOOSE__URI: mongodb://mongo:27017/app-ci
      MONGO_URI: mongodb://mongo:27017/app-ci
      API_URL: http://localhost:3000
      # Relaxes rate-limiting + disables the Better-Auth user-cache so
      # freshly-promoted admin users are recognised immediately.
      PLAYWRIGHT: 'true'
      # The Nuxt app needs these too: runtimeConfig ships an empty apiUrl and
      # locally only .env (gitignored) fills it. Without them every page logs
      # "[LtExtensions] No API URL configured" and auth calls resolve against
      # the app origin instead of the API.
      NUXT_API_URL: http://localhost:3000
      NUXT_PUBLIC_API_URL: http://localhost:3000
      NUXT_PUBLIC_SITE_URL: http://localhost:3001
      # The API derives BetterAuth's trustedOrigins and the passkey rpId/origin
      # from appUrl. Without it the app origin is untrusted and every
      # origin-checked endpoint (two-factor/enable, passkey) answers
      # 403 INVALID_ORIGIN.
      APP_URL: http://localhost:3001
      # The CI database starts empty, so the SystemSetup middleware redirects
      # every route to /auth/setup and no page under test ever renders. Seeding
      # the first admin on boot turns needsSetup off. Throwaway credentials for
      # a throwaway database — never reuse them anywhere else.
      NSC__SYSTEM_SETUP__INITIAL_ADMIN__EMAIL: ci-admin@test.com
      NSC__SYSTEM_SETUP__INITIAL_ADMIN__PASSWORD: CiThrowawayAdmin123!
      NSC__SYSTEM_SETUP__INITIAL_ADMIN__NAME: CI Admin
      # Where the API's stdout is captured. The email-verification specs read
      # the "[EMAIL VERIFICATION] … token=…" line from this file.
      NEST_SERVER_LOG: /tmp/nest-server.log
    steps:
      - uses: actions/checkout@v4
      # Provision the exact pnpm pinned in package.json (single source of truth).
      # No corepack: Node >= 25 no longer ships it. The +sha512 suffix is stripped;
      # npm enforces registry integrity for the tarball itself.
      - run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
      - run: pnpm install --frozen-lockfile
      - name: Frontend unit tests (vitest)
        run: cd projects/app && pnpm run test:unit
      - name: Boot API on :3000
        run: |
          # The subshell keeps the `cd` local: `cd projects/api && … &` backgrounds
          # the whole compound and leaves this shell in the repo root, so the
          # follow-up `cd ../..` used to land one level above it.
          (cd projects/api && pnpm run start:nodemon > "$NEST_SERVER_LOG" 2>&1) &
          timeout 120 sh -c 'until wget -q --spider http://localhost:3000/meta; do sleep 2; done'
      - name: Run Playwright E2E
        run: |
          cd projects/app
          pnpm exec playwright install --with-deps chromium
          pnpm exec playwright test --reporter=html
      - name: API log (on failure)
        if: failure()
        run: tail -n 60 "$NEST_SERVER_LOG" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            projects/app/playwright-report
            projects/app/test-results
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Provision the exact pnpm pinned in package.json (single source of truth).
      # No corepack: Node >= 25 no longer ships it. The +sha512 suffix is stripped;
      # npm enforces registry integrity for the tarball itself.
      - run: npm install -g "$(node -p "require('./package.json').packageManager.split('+')[0]")"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
