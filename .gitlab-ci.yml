# ======================================================================================================================
# Different stages for pipelines
# See https://docs.gitlab.com/ee/ci/pipelines/
# ======================================================================================================================
stages:
  - test
  - package

# ======================================================================================================================
# Docker image for runner
# See https://docs.gitlab.com/runner/
# ======================================================================================================================
image: node:22-alpine

# ======================================================================================================================
# Build identity / image coordinates
# IMAGE_TAG = the CI commit SHA — baked into both images (APP_VERSION_COMMIT) so
# App and API can be compared to detect a drifted / stale deployment (see
# docker-compose.yml). Set IMAGE_NAME (registry image prefix) as a CI/CD variable.
# ======================================================================================================================
variables:
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}
  IMAGE_TAG: ${CI_COMMIT_SHA}

# ======================================================================================================================
# Install npm packages for tasks
# Not processed directly because of the dot (.) at the beginning, but used later in tasks via `extends`
# ======================================================================================================================
.distributed:
  interruptible: true
  only:
    - merge_requests
  cache:
    key:
      files:
        - pnpm-lock.yaml
    paths:
      - .pnpm-store/
  before_script:
    - npm install -g corepack@latest
    - corepack enable
    - corepack install
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile

# ======================================================================================================================
# Lint jobs
# ======================================================================================================================
lint:
  stage: test
  extends: .distributed
  only:
    - merge_requests
  script:
    - pnpm run lint

# ======================================================================================================================
# Tests jobs
# ======================================================================================================================
api:test:
  stage: test
  extends: .distributed
  only:
    - merge_requests
  services: [mongo]
  script:
    - pnpm run api:test

app:test:
  stage: test
  image: mcr.microsoft.com/playwright:v1.58.0-noble
  extends: .distributed
  timeout: 1 hours
  only:
    - merge_requests
  services:
    - name: mongo:7
      alias: mongo
  variables:
    # API + App run on the classic ports here (no lt dev / Caddy in CI). The
    # App E2E tests read these env vars and fall back to localhost:3000/3001
    # when unset, so the same suite also runs under `lt dev up` locally.
    NSC__MONGOOSE__URI: "mongodb://mongo:27017/app-ci"
    MONGO_URI: "mongodb://mongo:27017/app-ci"
    API_URL: "http://localhost:3000"
    # PLAYWRIGHT=true relaxes rate-limiting and disables the Better-Auth
    # user-cache so freshly-promoted admin users are recognised immediately.
    PLAYWRIGHT: "true"
  script:
    # Boot the API in the background — Playwright's webServer block starts the
    # Nuxt app on :3001, but App E2E tests also need the API on :3000.
    - cd projects/api && pnpm run start:nodemon &
    - cd ../..
    - timeout 120 sh -c 'until wget -q --spider http://localhost:3000/meta; do sleep 2; done'
    - cd projects/app && pnpm exec playwright install --with-deps chromium
    - pnpm exec playwright test --reporter=html
  artifacts:
    when: always
    paths:
      - projects/app/playwright-report
      - projects/app/test-results
    expire_in: 1 week

# ======================================================================================================================
# Build jobs
# ======================================================================================================================
build:
  stage: test
  extends: .distributed
  only:
    - merge_requests
  script:
    - pnpm run build

# ======================================================================================================================
# Package jobs — build + push the deployment images with the build commit baked in
# ----------------------------------------------------------------------------------------------------------------------
# Builds both images via docker-compose.yml, passing IMAGE_TAG (= CI commit SHA)
# into the APP_VERSION_COMMIT build arg so GET /meta, /health-check and
# /app/admin/system report the exact running build. Runs on the deploy branches.
#
# Requires CI/CD variables: IMAGE_NAME (or CI_REGISTRY_IMAGE) + registry login.
# Add a deploy stage afterwards for your platform (e.g. TurboOps `turbo deploy`,
# `docker stack deploy`, …) — that part is platform-specific and intentionally
# left out of the template.
# ======================================================================================================================
package:images:
  stage: package
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker compose -f docker-compose.yml build
    - docker compose -f docker-compose.yml push api app
  only:
    - dev
    - test
    - main
