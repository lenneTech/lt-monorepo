# =====================================================================================================================
# Deployment compose for the fullstack monorepo (projects/api + projects/app).
#
# Build identity / drift detection
# --------------------------------
# Both images receive the build's git commit SHA via the APP_VERSION_COMMIT build
# arg, fed from IMAGE_TAG (= the CI commit SHA, see .gitlab-ci.yml). Each turns it
# into a runner-stage ENV and reads it at runtime, so the arg never enters a build
# layer's cache key and the expensive `nuxt build` / `nest build` layers stay warm:
#   - API  reads process.env and reports it via GET /meta + the /health-check badge
#   - App  maps NUXT_PUBLIC_APP_COMMIT onto runtimeConfig.public, which Nitro applies
#          on boot, and shows it under /app/admin/system
# Because both carry the SAME commit but read it independently, App and API can be
# compared to detect a mismatched / stale container after a partial rollout.
# Locally (no CI) it defaults to "unknown", which suppresses the drift warning.
#
# Required env (e.g. from .gitlab-ci.yml or `.env`):
#   IMAGE_NAME  container registry image prefix (e.g. registry.example.com/project)
#   IMAGE_TAG   image tag = CI commit SHA (defaults to "latest"/"unknown" locally)
# Runtime config (DB URI, secrets, …) is injected by the platform at deploy time.
# =====================================================================================================================
services:
  # === DATABASE ===
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Memory limits are load-bearing, not cosmetic. Node sizes its default V8 heap from the cgroup
    # limit (uv_get_constrained_memory) — with NO limit declared it reads the HOST's memory instead,
    # so on a 32 GB node a container happily targets a multi-GB heap and the host OOM-killer decides
    # who dies. Declaring a limit is what lets Node fail with its own graceful "JavaScript heap out
    # of memory" FATAL instead of an undiagnosable SIGKILL (exit 137, no stacktrace).
    # Do NOT pair this with a hardcoded --max-old-space-size: pinning a literal disables exactly the
    # auto-sizing described above. Tune these numbers to your workload.
    # `deploy.resources.limits` IS honoured by `docker compose up` (unlike deploy.replicas, which is
    # Swarm-only).
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: unless-stopped

  # === API (NestJS) ===
  api:
    build:
      context: .
      dockerfile: projects/api/Dockerfile
      args:
        # Monorepo build context: tell the Dockerfile where the API project lives.
        API_DIR: projects/api
        # IMAGE_TAG is the CI commit SHA (see .gitlab-ci.yml) — bake it in so the
        # running API can report its exact build via GET /meta + /health-check.
        APP_VERSION_COMMIT: ${IMAGE_TAG:-unknown}
    image: ${IMAGE_NAME}/api:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, NOT localhost: on Alpine `localhost` resolves to IPv6 ::1 first,
      # but the server listens on IPv4 0.0.0.0 only → "connection refused" → the
      # container never turns healthy even though it serves fine.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # See the note on `mongo` — a declared limit is what makes Node's own heap auto-sizing work.
    deploy:
      resources:
        limits:
          memory: 1024M
    # `unless-stopped` retries forever, and Docker RESETS its exponential backoff once a container
    # stays up for 10 seconds — so a bug that throws AFTER boot (a poison message, a bad document on
    # a request path, a scheduled job) restarts at full speed indefinitely with no backoff growth.
    # `on-failure` with a cap turns that into a visibly stopped container instead of a silent hot
    # loop. Note the diagnostics helper deliberately does NOT debounce in-process: after an
    # uncaughtException the process state is unknown, so continuing is the more dangerous option —
    # the throttling belongs here, at the orchestrator.
    restart: on-failure:10

  # === APP (Nuxt) ===
  app:
    build:
      context: .
      dockerfile: projects/app/Dockerfile
      args:
        # Monorepo build context: tell the Dockerfile where the app project lives.
        # The Dockerfile defaults APP_DIR=. for standalone (single-project) builds,
        # so the monorepo MUST pass projects/app or the build lands in the wrong dir
        # and the runner's `COPY .../.output` fails with "/app/.output: not found".
        APP_DIR: projects/app
        # IMAGE_TAG is the CI commit SHA (see .gitlab-ci.yml). The Dockerfile turns
        # it into ENV NUXT_PUBLIC_APP_COMMIT in the runner stage, which Nitro applies
        # over runtimeConfig.public on boot — so /app/admin/system can show + compare
        # the App build without the commit ever invalidating the `nuxt build` layer.
        APP_VERSION_COMMIT: ${IMAGE_TAG:-unknown}
    image: ${IMAGE_NAME}/app:${IMAGE_TAG:-latest}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, NOT localhost: on Alpine `localhost` resolves to IPv6 ::1 first,
      # but Nitro listens on IPv4 0.0.0.0 only → "connection refused" → the app
      # container never turns healthy even though it serves / with HTTP 200.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    # See the note on `mongo` — a declared limit is what makes Node's own heap auto-sizing work.
    deploy:
      resources:
        limits:
          memory: 1024M
    # See the note on `api` — Docker's backoff resets after 10s of uptime, so an unbounded
    # `unless-stopped` hides a post-boot crash loop.
    restart: on-failure:10

volumes:
  mongo_data:
